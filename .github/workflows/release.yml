name: Release to PyPI and GitHub

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 0.1.0)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build_wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux-x86_64
            runs-on: ubuntu-22.04
            cibw_archs: x86_64
          - os: linux-aarch64
            runs-on: ubuntu-22.04
            cibw_archs: aarch64
          - os: macos-arm64
            runs-on: macos-14
            cibw_archs: arm64
          - os: macos-x86_64
            runs-on: macos-13
            cibw_archs: x86_64
          - os: windows-x64
            runs-on: windows-latest
            cibw_archs: AMD64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU (Linux aarch64)
        if: matrix.cibw_archs == 'aarch64'
        uses: docker/setup-qemu-action@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          CIBW_BUILD: "cp312-* cp313-*"
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux_*"
          CIBW_ARCHS_LINUX: ${{ matrix.cibw_archs }}
          CIBW_ARCHS_MACOS: ${{ matrix.cibw_archs }}
          CIBW_ARCHS_WINDOWS: ${{ matrix.cibw_archs }}
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28
          CIBW_BEFORE_ALL_LINUX: "dnf install -y git && python {project}/scripts/download_opentui.py && cp {project}/src/opentui/opentui-libs/libopentui.so /usr/local/lib/ && ldconfig"
          CIBW_BEFORE_ALL_MACOS: "python {project}/scripts/download_opentui.py"
          CIBW_BEFORE_ALL_WINDOWS: "python {project}/scripts/download_opentui.py"
          CIBW_ENVIRONMENT_LINUX: "LD_LIBRARY_PATH={project}/src/opentui/opentui-libs"
          CIBW_TEST_REQUIRES: "pytest pytest-asyncio"
          CIBW_TEST_COMMAND: "pytest {project}/tests -v --tb=short -x"
          CIBW_ENVIRONMENT_PASS_LINUX: "GIT_TERMINAL_PROMPT"
          GIT_TERMINAL_PROMPT: "0"
          CIBW_BUILD_FRONTEND: "build[uv]"
          CIBW_BUILD_VERBOSITY: "1"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build
        run: pip install -q build

      - name: Validate pyproject.toml
        run: pip install -q validate-pyproject && validate-pyproject pyproject.toml

      - name: Build sdist
        run: python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish-to-pypi:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    environment:
      name: pypi
      url: https://pypi.org/p/opentui
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Flatten dist
        run: |
          mkdir -p dist/merged
          find dist -maxdepth 3 -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} dist/merged/ \;
          rm -rf dist/wheels-* dist/sdist
          mv dist/merged/* dist/
          rmdir dist/merged
          ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true

  publish-to-testpypi:
    name: Publish to TestPyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: test-pypi
      url: https://test.pypi.org/p/opentui
    permissions:
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Flatten dist
        run: |
          mkdir -p dist/merged
          find dist -maxdepth 3 -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} dist/merged/ \;
          rm -rf dist/wheels-* dist/sdist
          mv dist/merged/* dist/
          rmdir dist/merged
          ls -la dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          print-hash: true

  create-github-release:
    name: Create GitHub Release
    needs: [publish-to-pypi]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Flatten dist for release upload
        run: |
          mkdir -p release_assets
          find dist -maxdepth 3 -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} release_assets/ \;
          ls -la release_assets/

      - name: Determine release type
        id: release-type
        run: |
          if [[ ${{ github.ref_name }} =~ -alpha|-beta|-rc ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} \
            --title "opentui ${{ github.ref_name }}" \
            --generate-notes \
            ${{ steps.release-type.outputs.prerelease == 'true' && '--prerelease' || '--latest' }} \
            release_assets/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
